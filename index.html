  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

margin:0 0 8px; padding-bottom:5px; border-bottom:1px solid var(--cream-300);\">{{ grp.title }}<\u002Fdiv>\n            <div style=\"display:grid; grid-template-columns:195px 1fr; row-gap:8px; column-gap:14px; align-items:center;\">\n              <sc-for list=\"{{ grp.items }}\" as=\"t\" hint-placeholder-count=\"3\">\n                <sc-if value=\"{{ t.isVerdict }}\" hint-placeholder-val=\"{{ false }}\">\n                  <span class=\"{{ t.cls }}\" style=\"justify-self:start; display:inline-flex; align-items:center; padding:4px 11px; border-radius:999px; border:1.5px solid transparent; font-family:var(--font-heading); font-weight:800; font-size:10.5px; white-space:nowrap;\">{{ t.term }}<\u002Fspan>\n                <\u002Fsc-if>\n                <sc-if value=\"{{ t.isType }}\" hint-placeholder-val=\"{{ false }}\">\n                  <span class=\"{{ t.cls }}\" style=\"justify-self:start; padding:3px 9px; border-radius:6px; font-size:9.5px; font-weight:800; letter-spacing:0.07em; font-family:var(--font-heading); text-transform:uppercase;\">{{ t.term }}<\u002Fspan>\n                <\u002Fsc-if>\n                <sc-if value=\"{{ t.isDlv }}\" hint-placeholder-val=\"{{ false }}\">\n                  <span class=\"{{ t.cls }}\" style=\"justify-self:start; display:inline-flex; align-items:center; gap:5px; padding:3px 9px; border-radius:6px; font-family:var(--font-heading); font-weight:800; font-size:9.5px; letter-spacing:0.05em; text-transform:uppercase; border:1.5px solid transparent; white-space:nowrap;\"><i class=\"ph-fill {{ t.icon }}\"><\u002Fi> {{ t.term }}<\u002Fspan>\n                <\u002Fsc-if>\n                <sc-if value=\"{{ t.isMkt }}\" hint-placeholder-val=\"{{ false }}\">\n                  <span style=\"justify-self:start; display:inline-flex; align-items:center; gap:5px; padding:3px 9px; border-radius:6px; border:1.5px solid var(--navy-900); background:var(--white); font-family:var(--font-heading); font-weight:800; font-size:9.5px; letter-spacing:0.04em; text-transform:uppercase; color:var(--navy-900); white-space:nowrap;\"><i class=\"ph-fill ph-chart-bar\"><\u002Fi> {{ t.label }}<\u002Fspan>\n                <\u002Fsc-if>\n                <sc-if value=\"{{ t.isCond }}\" hint-placeholder-val=\"{{ false }}\">\n                  <span style=\"justify-self:start; padding:3px 9px; border-radius:6px; font-family:var(--font-heading); font-weight:800; font-size:9.5px; letter-spacing:0.05em; text-transform:uppercase; border:1.5px dashed var(--gold-500); color:var(--gold-600); white-space:nowrap;\">{{ t.label }}<\u002Fspan>\n                <\u002Fsc-if>\n                <span style=\"font-size:12.5px; line-height:1.5;\">{{ t.def }}<\u002Fspan>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ============ GLOSSARY ============ -->\n  <div data-sec=\"glossary\" style=\"margin:40px 44px 0;\" data-screen-label=\"Glossary\">\n    <div style=\"border-bottom:3px solid var(--navy-900); padding-bottom:10px; margin-bottom:16px;\">\n      <h2 style=\"font-family:var(--font-display); text-transform:uppercase; font-size:30px; line-height:1; color:var(--navy-900); margin:0;\">{{ glossTitle }}<\u002Fh2>\n      <p style=\"font-size:13px; color:var(--ink-500); margin:8px 0 0; line-height:1.5;\">{{ glossIntro }} You can also hover or tap any of these terms wherever they appear above.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"background:var(--white); border:1.5px solid var(--cream-300); border-radius:16px; padding:22px 26px; column-count:2; column-gap:32px;\">\n      <sc-for list=\"{{ glossary }}\" as=\"g\" hint-placeholder-count=\"20\">\n        <p style=\"margin:0 0 9px; font-size:12.5px; line-height:1.55; break-inside:avoid;\"><b style=\"color:var(--navy-900); font-family:var(--font-heading);\">{{ g.term }}<\u002Fb> — {{ g.def }}<\u002Fp>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <\u002Fdiv>\n  <!-- end page_order sections -->\n\n  <div style=\"margin:28px 44px 0;\">\n    <x-import component-from-global-scope=\"BlueStreakHangarDesignSystem_a233fe.QuestionsFooter\" message=\"Have a question about how a change affects YOUR seniority or base? Don't guess — drop it in the group and we'll dig into the language together.\" cta-label=\"Visit the Hangar\" href=\"#\" brand=\"Blue Streak, Junior &amp; Senior Hangar\" hint-size=\"100%,120px\"><\u002Fx-import>\n    <p style=\"text-align:center; font-size:10.5px; color:var(--ink-300); margin:18px 0 0;\">{{ contract }} · Guide v{{ version }} · {{ generator }}<\u002Fp>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1280}}\">\n\nconst A = window.ASSESSMENT || {};\nconst META = A.meta || {};\nconst SEC = A.sections || {};\nconst LEGEND = A.legend || {};\nconst SB = A.scoreboard || {};\nconst HTR = A.howToRead || {};\nconst PREFACE = A.preface || {};\nconst WEIGHTS = (A.ratingSystem || {}).weights || {};\nconst RLABELS = (A.ratingSystem || {}).labels || {};\nconst TYPE_LABELS = A.typeLabels || {};\nconst MKT_LABELS = A.marketLabels || {};\nconst GROUPS = A.groups || [];\nconst CHARTS = {}; (A.charts || []).forEach(c => { CHARTS[c.id] = c; });\nconst TABLES = A.tables || [];\n\nconst GROUP_SHORT = { nh: \"New Hire\", mc: \"Mid-Career\", sr: \"Senior\" };\n\n// v1.16 data gap: 4 of 6 charts carry prose placement strings instead of the\n// declared enum values — normalize by keyword until the analyzer fixes it.\nfunction normPlacement(p) {\n  // v2.0.1: anchors are guaranteed short, stable, single-token cat-<token>\n  // slugs by contract — pass clean placements through unchanged.\n  return String(p || \"\").toLowerCase();\n}\n\n// —— presentation maps: tone class names (colors live in helmet CSS; implied by sign per renderContract) ——\nfunction ratingCls(code) {\n  switch (code) {\n    case \"MG\": return \"t-mg\";\n    case \"SG\": r h-off\"\n    }));\n    const sbRows = (SB.rows || []).map(row => ({\n      title: row.topicTitle,\n      href: \"#\" + row.topic,\n      cells: [\"nh\", \"mc\", \"sr\"].map(k => {\n        const cell = row[k] || {};\n        return {\n          verdict: cell.verdict || \"\",\n          cls: verdictCls(cell.polarity, cell.score),\n          scoreLine: (cell.score >= 0 ? \"+\" : \"\") + cell.score + \" · \" + (cell.tally || \"\"),\n          addons: (cell.addonNotes || []).map(a => ({ text: a })),\n          hasBandEdge: !!cell.bandEdgeNote, bandEdgeNote: cell.bandEdgeNote || \"\",\n          wrapCls: k === grp ? \"cw-on\" : \"\"\n        };\n      })\n    }));\n    const PER_GROUP = (A.execSummary || {}).perGroup || {};\n\n    // topics\n    const sbByTopic = {}; (SB.rows || []).forEach(r => { sbByTopic[r.topic] = r; });\n    const closeMenu = (e) => { const d = e.currentTarget && e.currentTarget.closest(\"details\"); if (d) d.open = false; };\n    const sectionTitleOf = (key) => (SEC[key] && SEC[key].title) || key;\n    const topicLinks = (A.topics || []).map(t => ({ href: \"#\" + t.anchor, label: t.title, cls: \"jl-sub\", isLink: true, closeMenu }));\n    // hierarchical table-of-contents from page_order: the intro sections nest under a\n    // \"Set the stage\" header, the 7 topics nest under the topics-section header, and\n    // every other section is a flat top-level link. Two levels, derived from page_order.\n    const STAGE_KEYS = [\"what_this_is\", \"deal_in_one_paragraph\", \"how_to_use\", \"preface\"];\n    let jumpLinks;\n    if (META.showFullIndex) {\n      jumpLinks = [];\n      let stageStarted = false;\n      (HTR.page_order || []).forEach(key => {\n        if (STAGE_KEYS.indexOf(key) >= 0) {\n          if (!stageStarted) { jumpLinks.push({ label: \"Set the stage\", isHeader: true }); stageStarted = true; }\n          jumpLinks.push({ href: \"#sec-\" + key, label: sectionTitleOf(key), cls: \"jl-sub\", isLink: true, closeMenu });\n        } else if (key === \"topics\") {\n          jumpLinks.push({ label: sectionTitleOf(\"topics\"), isHeader: true });\n          topicLinks.forEach(t => jumpLinks.push(t));\n        } else {\n          jumpLinks.push({ href: \"#sec-\" + key, label: sectionTitleOf(key), cls: \"jl-top\", isLink: true, closeMenu });\n        }\n      });\n    } else {\n      jumpLinks = topicLinks.map(t => Object.assign({}, t, { cls: \"jl-top\" }));\n    }\n    // market_reality tables: those with no afterCard/afterItem dump at the section end;\n    // afterCard-anchored ones are interleaved right after their card below.\n    const mrEndTables = TABLES.filter(tb => normPlacement(tb.placement) === \"market_reality\" && tableRegOk(tb) && !tb.afterCard && !tb.afterItem);\n    const mrTablesHtml = window.VoteCard\n      ? mrEndTables.map(tb => window.VoteCard.dataTable(tb)).join(\"\")\n      : \"\";\n    const mrTablesNode = mrTablesHtml ? nodeFromHtml(mrTablesHtml) : null;\n    // market-reality cards as detail cards — same two-column shell as the change cards,\n    // with the marketVerdict tag + callout stat compiled into the right rail.\n    const mrCards = (A.marketCards || []).filter(m => normPlacement(m.placement) === \"market_reality\" && regOk(m));\n    const mrDetailHtml = (m) => {\n      const hasBullets = !!(m.bullets && m.bullets.length);\n      const showBody = detail === \"long\" || !hasBullets;\n      let left = '<div style=\"min-width:0;\"><h3 style=\"font-family:var(--font-heading); font-weight:800; font-size:17.5px; color:var(--navy-900); margin:0 0 12px; line-height:1.3;\">' + (m.title || \"\") + '<\u002Fh3>';\n      if (hasBullets) left += '<ul style=\"margin:0; padding-left:20px; display:flex; flex-direction:column; gap:8px;\">' + m.bullets.map(b => '<li style=\"font-size:14px; line-height:1.55; color:var(--ink-700);\">' + b + '<\u002Fli>').join('') + '<\u002Ful>';\n      if (showBody && (m.bodyLong || m.body)) left += '<p style=\"font-size:13px; line-height:1.6; margin:' + (hasBullets ? '13px' : '0') + ' 0 0; color:var(--ink-500);\">' + (m.bodyLong || m.body) + '<\u002Fp>';\n      left += '<\u002Fdiv>';\n      const mv = m.marketVerdict;\n      const sv = splitVerdict(mv);\n      const chip = (txt) => '<span style=\"display:inline-flex; align-items:center; gap:5px; padding:3px 9px; border-radius:6px; background:' + (MV_HEX[mv.tone] || 'var(--gold-500)') + '; color:var(--navy-900); font-family:var(--font-heading); font-weight:800; font-size:9.5px; letter-spacing:0.06em; text-transform:uppercase;\">' + txt + '<\u002Fspan>';\n      const panel = (title, icon, txt) => '<div style=\"background:var(--cream-100); border-radius:12px; padding:12px 14px;\"><div style=\"font-family:var(--font-heading); font-weight:800; font-size:9.5px; letter-spacing:0.1em; text-transform:uppercase; color:var(--ink-500); margin-bottom:6px;\">' + title + '<\u002Fdiv>' + chip('<i class=\"ph-fill ' + icon + '\"><\u002Fi> ' + txt) + '<\u002Fdiv>';\n      let mvBlock = '';\n      if (sv && sv.market) mvBlock += panel('Vs. the market', 'ph-chart-bar', sv.market);\n      if (sv && sv.momentum) mvBlock += panel('Where it\\'s headed', 'ph-trend-up', sv.momentum);\n      const calloutBlock = m.callout ? '<div style=\"background:var(--navy-900); border-radius:12px; padding:13px 15px;\"><div style=\"font-family:var(--font-heading); font-weight:800; font-size:9.5px; letter-spacing:0.1em; text-transform:uppercase; color:var(--gold-500); margin-bottom:6px;\">The takeaway<\u002Fdiv><div style=\"font-family:var(--font-heading); font-weight:800; font-size:15.5px; line-height:1.2; color:#fff;\">' + m.callout + '<\u002Fdiv><\u002Fdiv>' : '';\n      const right = '<div style=\"display:flex; flex-direction:column; gap:10px;\">' + mvBlock + calloutBlock + '<\u002Fdiv>';\n      return '<div style=\"background:var(--white); border:1.5px solid var(--cream-300); border-radius:16px; padding:20px 16px 20px 22px; margin-bottom:16px; display:grid; grid-template-columns:1fr 224px; gap:14px;\">' + left + right + '<\u002Fdiv>';\n    };\n    // each market card, followed by any table whose afterCard points at its id\n    const marketCardsNode = nodeFromHtml(mrCards.map(m => {\n      let html = mrDetailHtml(m);\n      if (window.VoteCard) TABLES.filter(tb => tb.afterCard === m.id && tableRegOk(tb)).forEach(tb => { html += window.VoteCard.dataTable(tb); });\n      return html;\n    }).join(\"\"));\n    const topicsTotal = (A.topics || []).length;\n    const categories = (A.topics || []).map((t, tIdx) => {\n      const row = (sbByTopic[t.anchor] || {})[grp] || {};\n      const changes = (t.changes || []).map(c => {\n        const chartIds = c.chart ? (Array.isArray(c.chart) ? c.chart : [c.chart]) : [];\n        const charts = chartIds.map(id => CHARTS[id]).filter(Boolean).map(spec => {\n          const cp = chartPiecesFor(spec);\n          return { leadIn: spec.leadIn, verdict: \"Verdict: \" + spec.verdict, vCls: chartVCls(spec.polarity),\n            chartNode: nodeFromHtml(cp.wrapHtml), toggleNode: nodeFromHtml(cp.toggle), caption: spec.plainCaption, assumptions: spec.assumptions };\n        });\n        const dlv = DLV[c.delivery] || DLV.automatic;\n        return {\n          typeLabel: TYPE_LABELS[c.type] || c.type,\n          typeCls: TYPE_CLS[c.type] || \"ty-kept\",\n          dlvLabel: dlv.label, dlvIcon: dlv.icon, dlvCls: dlv.cls,\n          hasCond: !!c.cond, noCond: !c.cond,\n          condLabel: c.cond ? ((A.condLabels || {})[c.cond] || (\"if \" + c.cond)) : \"\",\n          starts: formatStarts(c.starts), title: c.title,\n          today: c.today, proposed: c.proposed,\n          plain: c.plain || c.meaning,\n          hasMkt: !!c.market,\n          mktLabel: c.market ? (MKT_LABELS[c.market.position] || c.market.position) : \"\",\n          mktNote: c.market ? c.market.note : \"\",\n          charts,\n          meaning: c.meaning,\n          chips: [\"nh\", \"mc\", \"sr\"].map(k => {\n            const code = (c.rating || {})[k];\n            return {\n              group: GROUP_SHORT[k],\n              label: RLABELS[code] || code,\n              cls: ratingCls(code),\n              nameCls: k === grp ? \"wg-you\" : \"wg-off\"\n            };\n          })\n        };\n      });\n      const tables = TABLES.filter(tb => normPlacement(tb.placement) === t.anchor && tableRegOk(tb) && !tb.afterItem && !tb.afterCard).map(tb => ({\n        title: tb.title, leadIn: tb.leadIn, footnote: tb.footnote || \"\",\n        cols: tb.columns.map(c => ({ text: c })),\n        rows: tb.rows.map(r => ({ cells: r.map(c => ({ text: c })) }))\n      }));\n      // charts placed in this topic but not already shown inline on a specific change\n      // (e.g. a companion breakdown chart with no single item to hang off of)\n      const usedChartIds = {}; (t.changes || []).forEach(c => {\n        const ids = c.chart ? (Array.isArray(c.chart) ? c.chart : [c.chart]) : [];\n        ids.forEach(id => { usedChartIds[id] = true; });\n      });\n      const orphanCharts = (A.charts || []).filter(spec => normPlacement(spec.placement) === t.anchor && !usedChartIds[spec.id]).map(spec => {\n        const cp = chartPiecesFor(spec);\n        return { leadIn: spec.leadIn, verdict: \"Verdict: \" + spec.verdict, vCls: chartVCls(spec.polarity),\n          chartNode: nodeFromHtml(cp.wrapHtml), toggleNode: nodeFromHtml(cp.toggle), caption: spec.plainCaption, assumptions: spec.assumptions };\n      });\n      // topic-anchor-level context cards (item-placed ones are interleaved after their card below)\n      const marketNotes = (A.marketCards || []).filter(m => normPlacement(m.placement) === t.anchor && regOk(m)).map(mkMarketCard);\n      // each change card, followed by its afterItem tables and any context card placed on that item id\n      const cardsHtml = (t.changes || []).map(ch => {\n        let html = window.VoteCard ? window.VoteCard.changeCard(ch, { detail, group: grp, chipsAnchor: \"b0e49079f1-div\" }) : \"\";\n        if (window.VoteCard) TABLES.filter(tb => tb.afterItem === ch.id && tableRegOk(tb)).forEach(tb => { html += window.VoteCard.dataTable(tb); });\n        (A.marketCards || []).filter(m => m.placement === ch.id && regOk(m)).forEach(m => { html += ctxCardHtmlStr(m); });\n        return html;\n      }).join(\"\");\n      const cardsNode = React.createElement(\"div\", { dangerouslySetInnerHTML: { __html: cardsHtml } });\n      return {\n        anchor: t.anchor, title: t.title, topicNote: t.topicNote || \"\",\n        num: tIdx + 1, total: topicsTotal,\n        netNote: t.netNote,\n        verdict: row.verdict || \"\", vCls: verdictCls(row.polarity, row.score),\n        groupLabel: GROUP_SHORT[grp],\n        tally: row.tally || \"\",\n        score: (row.score >= 0 ? \"+\" : \"\") + row.score,\n        addons: (row.addonNotes || []).map(a => ({ text: a })),\n        hasAddons: (row.addonNotes || []).length > 0,\n        hasBandEdge: !!row.bandEdgeNote, bandEdgeNote: row.bandEdgeNote || \"\",\n        cardsNode, changes, tables, charts: orphanCharts, marketNotes\n      };\n    });\n\n    // accountability\n    const acct = (A.charts || []).find(c => normPlacement(c.placement) === \"accountability\") || null;\n\n    // \"Whose interest is whose\" — reframe the incentives copy from raw • bullets\n    // into a lead line, three labeled viewpoint rows, and a closing line. Parsed\n    // from the single data string so it stays data-driven: intro = text before\n    // the first bullet, points = the • lines, outro = text after the last.\n    const incLines = (PREFACE.incentives || \"\").split(\"\\n\").map(s => s.trim()).filter(Boolean);\n    let incFirstB = -1, incLastB = -1;\n    incLines.forEach((l, i) => { if (l.charAt(0) === \"\\u2022\") { if (incFirstB < 0) incFirstB = i; incLastB = i; } });\n    const incIntro = (incFirstB > 0 ? incLines.slice(0, incFirstB).join(\" \") : \"\").replace(/:\\s*$/, \".\");\n    const incOutro = (incLastB >= 0 && incLastB < incLines.length - 1) ? incLines.slice(incLastB + 1).join(\" \") : \"\";\n    const incPoints = (incFirstB < 0 ? [] : incLines.slice(incFirstB, incLastB + 1))\n      .filter(l => l.charAt(0) === \"\\u2022\")\n      .map(l => {\n        const raw = l.replace(/^\\u2022\\s*/, \"\");\n        const m = raw.match(/\\b(COMPANY|UNION|YOU)\\b/);\n        const party = m ? m[1] : \"\";\n        let text = raw.replace(/^(the\\s+)?(company|union|you)\\b[\\s,\\u2014-]*/i, \"\");\n        text = text ? text.charAt(0).toUpperCase() + text.slice(1) : raw;\n        return { party, text };\n      });\n    // Fixed party set (schema guarantees COMPANY/UNION/YOU) → expose per-party\n    // text + presence so the template can use literal row colors (no style holes).\n    const incMap = {};\n    incPoints.forEach(p => { if (p.party) incMap[p.party] = p.text; });\n\n    return {\n      contract: META.contract || \"\", version: META.version || \"\", generator: META.generator || \"\",\n      pageTitle: META.pageTitle || \"\", pageSubtitle: META.pageSubtitle || \"\", baseline: META.baseline || \"\",\n      reportUrl: META.reportUrl || \"\", hasReportUrl: !!META.reportUrl,\n      secWhatTitle: (SEC.what_this_is || {}).title || \"\", whatThisIs: HTR.what_this_is || \"\",\n      secDealTitle: (SEC.deal_in_one_paragraph || {}).title || \"\", dealInOneParagraph: HTR.deal_in_one_paragraph || \"\",\n      secHowTitle: (SEC.how_to_use || {}).title || \"\", howToUse: HTR.how_to_use || \"\",\n      prefaceTitle: (SEC.preface || {}).title || \"\", prefaceIntro: (SEC.preface || {}).intro || \"\",\n      prefaceCycle: PREFACE.cycle || \"\", prefaceForward: PREFACE.forward_protection || \"\",\n      incIntro, incOutro,\n      incCompany: incMap.COMPANY || \"\", incUnion: incMap.UNION || \"\", incYou: incMap.YOU || \"\",\n      hasIncCompany: !!incMap.COMPANY, hasIncUnion: !!incMap.UNION, hasIncYou: !!incMap.YOU,\n      prefaceFair: PREFACE.fair_both_ways || \"\",\n      outlookTitle: (SEC.outlook || {}).title || \"\", outlookIntro: (SEC.outlook || {}).intro || \"\",\n      hasOutlookChart: !!outlookChart,\n      outlookLeadIn: outlookChart ? outlookChart.leadIn : \"\", outlookVerdict: outlookChart ? outlookChart.verdict : \"\",\n      outlookChartNode: outlookChart ? nodeFromHtml(chartPiecesFor(outlookChart).wrapHtml) : null,\n      outlookCaption: outlookChart ? outlookChart.plainCaption : \"\", outlookAssumptions: outlookChart ? outlookChart.assumptions : \"\",\n      outlookCards,\n      anchorsSecTitle: (SEC.anchors || {}).title || \"\", anchorsSecIntro: (SEC.anchors || {}).intro || \"\",\n      keySecTitle: (SEC.key || {}).title || \"\", keySecIntro: (SEC.key || {}).intro || \"\",\n      methTitle: (META.methodology || {}).title || \"\", methIntro: (META.methodology || {}).intro || \"\",\n      methAnchorsIntro: (META.methodology || {}).anchorsIntro || \"\",\n      methAnchors: (META.methodology || {}).anchors || [],\n      legendRatings,\n      legendVerdicts: legendVerdictObjs, legendTags: legendTagObjs, legendTagGroups, legendAllGroups, ratingCols,\n      fypTitle: (SEC.find_your_position || {}).title || \"\", fypIntro: (SEC.find_your_position || {}).intro || \"\",\n      groupBtns, groupDefinition: groupDef, fypSel, fypOthers, hasFypOthers,\n      hasFypSel: !!selSpec, noFypSel: !selSpec,\n      currentGroupLabel: (GROUPS.find(g => g.key === grp) || {}).label || \"\",\n      sbTitle: (SEC.scoreboard || {}).title || \"\", sbIntro: (SEC.scoreboard || {}).intro || \"\",\n      sbHeads, sbRows, sbDepNote: SB.note_on_dep || \"\", matrixNote: (A.execSummary || {}).matrixNote || \"\",\n      perGroupNh: PER_GROUP.nh || \"\", perGroupMc: PER_GROUP.mc || \"\", perGroupSr: PER_GROUP.sr || \"\",\n      topicsTitle: (SEC.topics || {}).title || \"\", jumpLinks, categories, detailBtns,\n      mrTitle: (SEC.market_reality || {}).title || \"\", mrIntro: (SEC.market_reality || {}).intro || \"\",\n      marketCardsNode,\n      mrTablesNode,\n      anchorNotes,\n      acctTitle: (SEC.accountability || {}).title || \"\", acctIntro: (SEC.accountability || {}).intro || \"\",\n      acctLeadIn: acct ? acct.leadIn : \"\", acctVerdict: acct ? acct.verdict : \"\",\n      acctChartNode: acct ? nodeFromHtml(chartPiecesFor(acct).wrapHtml) : null,\n      acctCaption: acct ? acct.plainCaption : \"\", acctAssumptions: acct ? acct.assumptions : \"\",\n      glossTitle: (SEC.glossary || {}).title || \"\", glossIntro: (SEC.glossary || {}).intro || \"\",\n      glossary: (A.glossary || []).map(g => ({ term: g[0], def: g[1] }))\n    };\n  }\n}\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
