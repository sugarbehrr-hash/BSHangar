  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

w-gap:8px; column-gap:14px; align-items:center;\">\n              <sc-for list=\"{{ grp.items }}\" as=\"t\" hint-placeholder-count=\"3\">\n                <sc-if value=\"{{ t.isVerdict }}\" hint-placeholder-val=\"{{ false }}\">\n                  <span class=\"{{ t.cls }}\" style=\"justify-self:start; display:inline-flex; align-items:center; padding:4px 11px; border-radius:999px; border:1.5px solid transparent; font-family:var(--font-heading); font-weight:800; font-size:10.5px; white-space:nowrap;\">{{ t.term }}<\u002Fspan>\n                <\u002Fsc-if>\n                <sc-if value=\"{{ t.isType }}\" hint-placeholder-val=\"{{ false }}\">\n                  <span class=\"{{ t.cls }}\" style=\"justify-self:start; padding:3px 9px; border-radius:6px; font-size:9.5px; font-weight:800; letter-spacing:0.07em; font-family:var(--font-heading); text-transform:uppercase;\">{{ t.term }}<\u002Fspan>\n                <\u002Fsc-if>\n                <sc-if value=\"{{ t.isDlv }}\" hint-placeholder-val=\"{{ false }}\">\n                  <span class=\"{{ t.cls }}\" style=\"justify-self:start; display:inline-flex; align-items:center; gap:5px; padding:3px 9px; border-radius:6px; font-family:var(--font-heading); font-weight:800; font-size:9.5px; letter-spacing:0.05em; text-transform:uppercase; border:1.5px solid transparent; white-space:nowrap;\"><i class=\"ph-fill {{ t.icon }}\"><\u002Fi> {{ t.term }}<\u002Fspan>\n                <\u002Fsc-if>\n                <sc-if value=\"{{ t.isMkt }}\" hint-placeholder-val=\"{{ false }}\">\n                  <span style=\"justify-self:start; display:inline-flex; align-items:center; gap:5px; padding:3px 9px; border-radius:6px; border:1.5px solid var(--navy-900); background:var(--white); font-family:var(--font-heading); font-weight:800; font-size:9.5px; letter-spacing:0.04em; text-transform:uppercase; color:var(--navy-900); white-space:nowrap;\"><i class=\"ph-fill ph-chart-bar\"><\u002Fi> {{ t.label }}<\u002Fspan>\n                <\u002Fsc-if>\n                <sc-if value=\"{{ t.isCond }}\" hint-placeholder-val=\"{{ false }}\">\n                  <span style=\"justify-self:start; padding:3px 9px; border-radius:6px; font-family:var(--font-heading); font-weight:800; font-size:9.5px; letter-spacing:0.05em; text-transform:uppercase; border:1.5px dashed var(--gold-500); color:var(--gold-600); white-space:nowrap;\">{{ t.label }}<\u002Fspan>\n                <\u002Fsc-if>\n                <span style=\"font-size:12.5px; line-height:1.5;\">{{ t.def }}<\u002Fspan>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ============ GLOSSARY ============ -->\n  <div data-sec=\"glossary\" style=\"margin:40px 44px 0;\" data-screen-label=\"Glossary\">\n    <div style=\"border-bottom:3px solid var(--navy-900); padding-bottom:10px; margin-bottom:16px;\">\n      <h2 style=\"font-family:var(--font-display); text-transform:uppercase; font-size:30px; line-height:1; color:var(--navy-900); margin:0;\">{{ glossTitle }}<\u002Fh2>\n      <p style=\"font-size:13px; color:var(--ink-500); margin:8px 0 0; line-height:1.5;\">{{ glossIntro }} You can also hover or tap any of these terms wherever they appear above.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"background:var(--white); border:1.5px solid var(--cream-300); border-radius:16px; padding:22px 26px; column-count:2; column-gap:32px;\">\n      <sc-for list=\"{{ glossary }}\" as=\"g\" hint-placeholder-count=\"20\">\n        <p style=\"margin:0 0 9px; font-size:12.5px; line-height:1.55; break-inside:avoid;\"><b style=\"color:var(--navy-900); font-family:var(--font-heading);\">{{ g.term }}<\u002Fb> — {{ g.def }}<\u002Fp>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <\u002Fdiv>\n  <!-- end page_order sections -->\n\n  <div style=\"margin:28px 44px 0;\">\n    <x-import component-from-global-scope=\"BlueStreakHangarDesignSystem_a233fe.QuestionsFooter\" message=\"Have a question about how a change affects YOUR seniority or base? Don't guess — drop it in the group and we'll dig into the language together.\" cta-label=\"Visit the Hangar\" href=\"#\" brand=\"Blue Streak, Junior &amp; Senior Hangar\" hint-size=\"100%,120px\"><\u002Fx-import>\n    <p style=\"text-align:center; font-size:10.5px; color:var(--ink-300); margin:18px 0 0;\">{{ contract }} · Guide v{{ version }} · {{ generator }}<\u002Fp>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1280}}\">\n\nconst A = window.ASSESSMENT || {};\nconst META = A.meta || {};\nconst SEC = A.sections || {};\nconst LEGEND = A.legend || {};\nconst SB = A.scoreboard || {};\nconst HTR = A.howToRead || {};\nconst PREFACE = A.preface || {};\nconst WEIGHTS = (A.ratingSystem || {}).weights || {};\nconst RLABELS = (A.ratingSystem || {}).labels || {};\nconst TYPE_LABELS = A.typeLabels || {};\nconst MKT_LABELS = A.marketLabels || {};\nconst GROUPS = A.groups || [];\nconst CHARTS = {}; (A.charts || []).forEach(c => { CHARTS[c.id] = c; });\nconst TABLES = A.tables || [];\n\nconst GROUP_SHORT = { nh: \"New Hire\", mc: \"Mid-Career\", sr: \"Senior\" };\n\n// v1.16 data gap: 4 of 6 charts carry prose placement strings instead of the\n// declared enum values — normalize by keyword until the analyzer fixes it.\nfunction normPlacement(p) {\n  p = String(p || \"\").toLowerCase();\n  if (p.indexOf(\"hero\") === 0) return \"hero\";\n  if (/find[_ ]your[_ ]position/.test(p)) return \"find_your_position\";\n  if (/accountability/.test(p)) return \"accountability\";\n  if (/scoreboard/.test(p)) return \"scoreboard\";\n  const m = p.match(/cat-[a-z]+/);\n  return m ? m[0] : p;\n}\n\n// —— presentation maps: tone class names (colors live in helmet CSS; implied by sign per renderContract) ——\nfunction ratingCls(code) {\n  switch (code) {\n    case \"MG\": return \"t-mg\";\n    case \"SG\": return \"t-sg\";\n    case \"sg\": return \"t-sgs\";\n    case \"tk\": return \"t-tk\";\n    case \"nc\": return \"t-nc\";\n    case \"sc\": return \"t-sc\";\n    case \"RC\": return \"t-rc\";\n    case \"XC\": return \"t-xc\";\n    case \"dep\": return \"t-dep\";\n    default: return \"t-nc\";\n  }\n}\nfunction ratingClsByWeight(w) {\n  if (w == null) return \"t-dep\";\n  if (w >= 3) return \"t-mg\";\n  if (w >= 2) return \"t-sg\";\n  if (w >= 1) return \"t-sgs\";\n  if (w > 0) return \"t-tk\";\n  if (w === 0) return \"t-nc\";\n  if (w <= -3) return \"t-xc\";\n  if (w <= -2) return \"t-rc\";\n  return \"t-sc\";\n}\n// —— maps a legend tag's literal term to the exact badge markup used on change cards ——\nfunction tagVisual(term) {\n  if (term === \"NEW\") return { kind: \"type\", cls: \"ty-new\" };\n  if (term === \"KEPT\") return { kind: \"type\", cls: \"ty-kept\" };\n  if (term === \"RESTORED\") return { kind: \"type\", cls: \"ty-restored\" };\n  if (term === \"Automatic rule\") return { kind: \"dlv\", cls: \"dl-auto\", icon: \"ph-seal-check\" };\n  if (term === \"Delayed rule\") return { kind: \"dlv\", cls: \"dl-delayed\", icon: \"ph-hourglass-medium\" };\n  if (term === \"Implementation promise\") return { kind: \"dlv\", cls: \"dl-promise\", icon: \"ph-hammer\" };\n  if (term.indexOf(\"Market:\") === 0) return { kind: \"mkt\", label: term.replace(\"Market: \", \"\") };\n  if (/^if /.test(term)) return { kind: \"cond\", label: term };\n  return { kind: \"plain\" };\n}\nfunction verdictCls(v) {\n  if (/CLEAR WIN/i.test(v)) return \"v-g3\";\n  if (/net positive/i.test(v)) return \"v-g2\";\n  if (/positive/i.test(v)) return \"v-g1\";\n  if (/wash/i.test(v)) return \"v-wash\";\n  if (/CLEAR LOSS/i.test(v)) return \"v-r3\";\n  if (/net negative/i.test(v)) return \"v-r2\";\n  return \"v-r1\";\n}\nfunction chartVCls(v) {\n  if (/POSITIVE|WIN/i.test(v)) return \"cv-pos\";\n  if (/MIXED|DEPEND/i.test(v)) return \"cv-mix\";\n  return \"cv-neg\";\n}\n// display-only date formatting: \"3/6/2026\" -> \"Mar 2026\". Never touches non-date\n// text; teammates asked to drop day-level precision from the \"starts\" chip.\nconst MONTHS_SHORT = [\"Jan\", \"Feb\", \"Mar\", \"Apr\", \"May\", \"Jun\", \"Jul\", \"Aug\", \"Sep\", \"Oct\", \"Nov\", \"Dec\"];\nfunction formatStarts(s) {\n  if (!s) return s;\n  return String(s).replace(/\\b(\\d{1,2})\\/(\\d{1,2})\\/(\\d{4})\\b/g, function (_, mm, dd, yyyy) {\n    var mi = parseInt(mm, 10) - 1;\n    return (MONTHS_SHORT[mi] || mm) + \" \" + yyyy;\n  });\n}\nconst DLV = {\n  automatic: { label: \"Automatic rule\", icon: \"ph-seal-check\", cls: \"dl-auto\" },\n  delayed:   { label: \"Delayed rule\", icon: \"ph-hourglass-medium\", cls: \"dl-delayed\" },\n  promise:   { label: \"Implementation promise\", icon: \"ph-hammer\", cls: \"dl-promise\" }\n};\nconst TYPE_CLS = { NEW: \"ty-new\", CODIFY: \"ty-kept\", RESTORE: \"ty-restored\" };\n\n// —— glossary hover/tap tooltips ——\nconst GLOSS = (A.glossary || []).map(t => {\n  const isAcro = /^[A-Z]{2,}s?$/.test(t[0]);\n  const esc = t[0].replace(/[.*+?^${}()|[\\]\\\\]/g, \"\\\\$&\");\n  return { label: t[0], def: t[1], re: new RegExp(\"(^|[^\\\\w])(\" + esc + \")(?![\\\\w])\", isAcro ? \"g\" : \"gi\") };\n});\nfunction initGlossary() {\n  if (window.__rv2Glossary) return;\n  window.__rv2Glossary = true;\n  const tip = document.createElement(\"div\");\n  tip.style.cssText = \"position:fixed;z-index:9999;max-width:290px;background:var(--navy-900,#0f1e3d);color:#fff;border-radius:10px;padding:10px 13px;font-size:12.5px;line-height:1.5;box-shadow:0 6px 22px rgba(15,30,61,0.35);pointer-events:none;display:none;font-family:var(--font-body,sans-serif);\";\n  document.body.appendChild(tip);\n  let last = null, timer = null;\n  function findTerm(x, y) {\n    let range = null;\n    if (document.caretRangeFromPoint) range = document.caretRangeFromPoint(x, y);\n    else if (document.caretPositionFromPoint) {\n      const p = document.caretPositionFromPoint(x, y);\n      if (p) { range = document.createRange(); range.setStart(p.offsetNode, p.offset); }\n    }\n    const node = range && range.startContainer;\n    if (!node || node.nodeType !== 3 || (node.parentElement && node.parentElement.closest(\"script,style,a,h1,h2\"))) return null;\n    const text = node.textContent, off = range.startOffset;\n    for (let i = 0; i < GLOSS.length; i++) {\n      const g = GLOSS[i]; g.re.lastIndex = 0; let m;\n      while ((m = g.re.exec(text))) {\n        const s = m.index + m[1].length, en = s + m[2].length;\n        if (off >= s && off <= en) return g;\n        if (s > off) break;\n      }\n    }\n    return null;\n  }\n  function showTip(hit, x, y) {\n    if (last !== hit) {\n      tip.innerHTML = \"\";\n      const b = document.createElement(\"b\"); b.textContent = hit.label; b.style.cssText = \"display:block;margin-bottom:3px;color:#E8B84B;\";\n      tip.appendChild(b); tip.appendChild(document.createTextNode(hit.def));\n      last = hit;\n    }\n    tip.style.display = \"block\";\n    const w = tip.offsetWidth, h = tip.offsetHeight;\n    let px = x + 14, py = y + 16;\n    if (px + w > window.innerWidth - 10) px = Math.max(10, x - w - 12);\n    if (py + h > window.innerHeight - 10) py = Math.max(10, y - h - 12);\n    tip.style.left = px + \"px\"; tip.style.top = py + \"px\";\n  }\n  function hideTip() { tip.style.display = \"none\"; last = null; }\n  let touching = false;\n  document.addEventListener(\"touchstart\", () => { touching = true; }, { passive: true });\n  document.addEventListener(\"mousemove\", e => {\n    if (touching) { touching = false; return; }\n    if (timer) return;\n    timer = setTimeout(() => { timer = null; }, 60);\n    const hit = findTerm(e.clientX, e.clientY);\n    if (hit) showTip(hit, e.clientX, e.clientY); else hideTip();\n  });\n  document.addEventListener(\"touchend\", e => {\n    const t = e.changedTouches && e.changedTouches[0];\n    if (!t) return;\n    const el = document.elementFromPoint(t.clientX, t.clientY);\n    if (el && el.closest(\"button,a,input,label,summary\")) { hideTip(); return; }\n    const hit = findTerm(t.clientX, t.clientY);\n    if (hit) showTip(hit, t.clientX, t.clientY); else hideTip();\n  }, { passive: true });\n  document.addEventListener(\"scroll\", hideTip, { passive: true });\n}\n\n// Scoreboard \"your group\" frame: a single overlay that slides over the active column,\n// measured from the live DOM so it always hugs the column exactly (no per-cell boxes).\nfunction positionSbHighlight() {\n  const wrap = document.querySelector(\"[data-sb-wrap]\");\n  const hl = wrap && wrap.querySelector(\"[data-sb-hl]\");\n  if (!wrap || !hl) return;\n  const active = wrap.querySelector(\"[data-sb-head].sbh-on\");\n  const rows = wrap.querySelectorAll(\"[data-sb-row]\");\n  if (!active || !rows.length) { hl.style.display = \"none\"; return; }\n  const wr = wrap.getBoundingClientRect();\n  const ar = active.getBoundingClientRect();\n  const lr = rows[rows.length - 1].getBoundingClientRect();\n  const top = ar.top - wr.top - 10;\n  const bottom = lr.bottom - wr.top + 5;\n  hl.style.display = \"block\";\n  hl.style.left = (ar.left - wr.left - 12) + \"px\";\n  hl.style.width = (ar.width + 24) + \"px\";\n  hl.style.top = top + \"px\";\n  hl.style.height = (bottom - top) + \"px\";\n}\n\nclass Component extends DCLogic {\n  constructor(props) {\n    super(props);\n    let saved = {};\n    try { saved = JSON.parse(localStorage.getItem(\"rv2-ta-state\") || \"{}\"); } catch (e) {}\n    this.state = { group: saved.group || \"nh\", detail: saved.detail || \"short\" };\n  }\n  componentDidMount() {\n    initGlossary();\n    // honor howToRead.page_order: set flex order (and hide absent sections) via DOM,\n    // not style holes, so the page paints immediately and still follows the data.\n    const PO = HTR.page_order || [];\n    const ordOf = {}; PO.forEach((k, i) => { ordOf[k] = i; });\n    document.querySelectorAll(\"[data-sec]\").forEach(el => {\n      const k = el.getAttribute(\"data-sec\");\n      if // legend / key — rating chips come from ratingPill (label + weight + blurb)\n    const legendRatings = (LEGEND.ratingPill || []).map(p => ({\n      label: p.label, def: p.blurb,\n      weight: p.weight == null ? \"wildcard\" : (p.weight > 0 ? \"+\" + p.weight : \"\" + p.weight),\n      cls: ratingClsByWeight(p.weight),\n      valence: p.weight == null ? \"neutral\" : (p.weight > 0 ? \"gain\" : (p.weight < 0 ? \"cost\" : \"neutral\"))\n    }));\n    const ratingCols = [\n      { title: \"Gains\", items: legendRatings.filter(r => r.valence === \"gain\") },\n      { title: \"Neutral\", items: legendRatings.filter(r => r.valence === \"neutral\") },\n      { title: \"Costs\", items: legendRatings.filter(r => r.valence === \"cost\") }\n    ];\n    const pairObjs = arr => (arr || []).map(p => ({ term: p[0], def: p[1] }));\n    const legendTagObjs = (LEGEND.tags || []).map(p => {\n      const v = tagVisual(p[0]);\n      return Object.assign({ term: p[0], def: p[1], isType: v.kind === \"type\", isDlv: v.kind === \"dlv\", isMkt: v.kind === \"mkt\", isCond: v.kind === \"cond\" }, v);\n    });\n    const legendGroupDefs = [\n      { title: \"Change type\", kind: \"type\" },\n      { title: \"How sure is it\", kind: \"dlv\" },\n      { title: \"Vs. other airlines\", kind: \"mkt\" },\n      { title: \"Who it covers\", kind: \"cond\" }\n    ];\n    const legendTagGroups = legendGroupDefs.map(g => ({\n      title: g.title,\n      items: legendTagObjs.filter(t => t.kind === g.kind)\n    })).filter(g => g.items.length);\n\n    const legendVerdictObjs = (LEGEND.verdicts || []).map(p => ({ term: p[0], def: p[1], cls: verdictCls(p[0]), isVerdict: true }));\n    const legendAllGroups = [{ title: \"Category verdicts\", isVerdict: true, items: legendVerdictObjs }].concat(legendTagGroups);\n\n    // find your position\n    const groupDef = (GROUPS.find(g => g.key === grp) || {}).definition || \"\";\n    const groupBtns = GROUPS.map(g => ({\n      label: g.label,\n      shortLabel: GROUP_SH
